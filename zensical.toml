[project]
site_name = "cb-events"
site_description = "Async Python client for the Chaturbate Events API."
site_url = "https://mountaingod2.github.io/cb-events/"
repo_url = "https://github.com/MountainGod2/cb-events"
repo_name = "MountainGod2/cb-events"

nav = [
    { "Home" = "index.md" },
    { "Installation" = "installation.md" },
    { "Quick Start" = "quickstart.md" },
    { "Event Models" = "event_models.md" },
    { "Configuration" = "configuration.md" },
    { "Error Handling" = "error_handling.md" },
    { "API Reference" = [
        { "Overview" = "api/index.md" },
        { "Modules" = [
            { "client" = "api/client.md" },
            { "config" = "api/config.md" },
            { "exceptions" = "api/exceptions.md" },
            { "models" = "api/models.md" },
            { "router" = "api/router.md" },
        ] },
    ] },
    { "Changelog" = "changelog.md" },
]

[project.theme]
language = "en"
features = [
    "navigation.sections",
    "navigation.top",
    "content.code.copy",
    "search.suggest",
    "search.highlight",
]

[project.plugins.search]

[project.plugins.mkdocstrings.handlers.python]
paths = ["src"]

[project.plugins.mkdocstrings.handlers.python.options]
docstring_style = "google"
merge_init_into_class = true
show_source = false
heading_level = 4
filters = ["!^_[^_]", "!^__.*__$", "!^build_http_error$", "!^truncate_text$"]

[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.highlight]
[project.markdown_extensions.pymdownx.snippets]
base_path = [".", "docs"]
check_paths = true
[project.markdown_extensions.pymdownx.superfences]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.toc]
permalink = true

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
toggle.icon = "material/brightness-7"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle.icon = "material/brightness-4"
toggle.name = "Switch to light mode"
