name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      publish_tag:
        description: Existing git tag to publish from (for retrying PyPI upload)
        required: true
        type: string

permissions: {}

jobs:
  build:
    name: Build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
    outputs:
      released: ${{ steps.version.outputs.released }}
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Checkout accurate branch
        env:
          REF_NAME: ${{ github.ref_name }}
        run: git checkout -B "$REF_NAME"

      - name: Setup uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.29"
          python-version: "3.13"
          enable-cache: true
          cache-suffix: build-3.13-${{ hashFiles('uv.lock') }}

      - name: Sync build dependencies
        run: uv sync --group build --no-default-groups --frozen

      - name: Determine version
        id: version
        run: uv run semantic-release -v version --no-commit --no-tag

      - name: Upload dist
        if: steps.version.outputs.released == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/**
          if-no-files-found: error
          retention-days: 2

      - name: Prune uv cache
        if: always()
        run: uv cache prune --ci

  e2e:
    name: Live E2E Tests
    needs: build
    if: github.event_name == 'push' && needs.build.outputs.released == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    environment: e2e
    env:
      CB_RUN_LIVE_TESTS: "1"
      CB_EVENTS_URL: ${{ secrets.CB_EVENTS_URL }}
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Download dist artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist

      - name: Setup uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.29"
          python-version: "3.13"
          enable-cache: true
          cache-suffix: e2e-3.13-${{ hashFiles('uv.lock') }}

      - name: Sync test dependencies
        run: uv sync --group=test --no-install-project --frozen

      - name: Install built wheel
        run: uv pip install dist/cb_events-*.whl

      - name: Validate URL variable is set
        run: |
          if [[ -z "${CB_EVENTS_URL:-}" ]]; then
            echo "::error::CB_EVENTS_URL is empty."
            exit 1
          fi

      - name: Run live E2E tests
        env:
          UV_NO_SYNC: "1"
        run: make test-live PYTEST="uv run --no-sync pytest"

      - name: Prune uv cache
        if: always()
        run: uv cache prune --ci

  release:
    name: Release
    needs: [build, e2e]
    if: github.event_name == 'push' && needs.build.outputs.released == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    environment: release
    concurrency:
      group: release-main
      cancel-in-progress: false
    permissions:
      contents: read
    steps:
      - name: Generate release token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          permission-contents: write

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: true

      - name: Reset to accurate SHA
        env:
          GIT_SHA: ${{ github.sha }}
        run: git reset --hard "$GIT_SHA"

      - name: Setup uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.29"
          python-version: "3.13"
          enable-cache: false
          cache-suffix: release-3.13-${{ hashFiles('uv.lock') }}

      - name: Sync build dependencies
        run: uv sync --group build --no-default-groups --frozen

      - name: Verify upstream is unchanged
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: bash .github/scripts/verify_upstream.sh

      - name: Create release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: uv run semantic-release -v --strict version

      - name: Prune uv cache
        if: always()
        run: uv cache prune --ci

  deploy:
    name: Deploy to PyPI
    needs: [build, release]
    if: github.event_name == 'push' && needs.build.outputs.released == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    environment:
      name: pypi
      url: https://pypi.org/project/cb-events/
    permissions:
      attestations: write
      contents: read
      id-token: write
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: dist
          print-hash: true
          verbose: true
          attestations: true
          skip-existing: true

      - name: Generate build provenance
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: dist/*

  publish-only:
    name: Publish Existing Tag to PyPI
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    environment:
      name: pypi
      url: https://pypi.org/project/cb-events/
    permissions:
      attestations: write
      contents: read
      id-token: write
    steps:
      - name: Checkout existing tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.publish_tag }}
          fetch-depth: 1
          persist-credentials: false

      - name: Setup uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.29"
          python-version: "3.13"
          enable-cache: false
          cache-suffix: publish-only-3.13-${{ hashFiles('uv.lock') }}

      - name: Sync build dependencies
        run: uv sync --group build --no-default-groups --frozen

      - name: Build distributions
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: dist
          print-hash: true
          verbose: true
          attestations: true
          skip-existing: true

      - name: Generate build provenance
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: dist/*
