name: CI/CD

on:
  push:
    branches: [main, "renovate/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' && github.ref != 'refs/heads/main' }}

permissions: {}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.14"
          python-version: "3.13"
          enable-cache: true
          cache-suffix: lint-3.13-${{ hashFiles('uv.lock') }}

      - name: Sync lint and docs dependencies
        run: uv sync --group=lint --group=docs --frozen

      - name: Verify requirements.txt is up to date
        run: make requirements-check

      - name: Run lint checks
        run: make lint

      - name: Prune uv cache
        run: uv cache prune --ci

  test:
    name: Test (${{ matrix.python-version }}, ${{ matrix.resolution }})
    needs: lint
    runs-on: ubuntu-24.04
    environment: testing
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        resolution: ["highest"]
        include:
          - python-version: "3.10"
            resolution: "lowest-direct"
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.14"
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-suffix: test-${{ matrix.python-version }}-${{ matrix.resolution }}-${{ hashFiles('pyproject.toml', 'uv.lock') }}

      - name: Sync test dependencies
        if: ${{ matrix.resolution == 'highest' }}
        run: uv sync --group=test --frozen

      - name: Run tests with coverage
        if: ${{ matrix.resolution == 'highest' }}
        run: make test-cov

      - name: Run tests with lowest direct dependency bounds
        if: ${{ matrix.resolution == 'lowest-direct' }}
        run: make test-cov-lowest-direct

      - name: Upload coverage metrics
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        continue-on-error: true
        with:
          files: coverage.xml
          flags: ${{ matrix.python-version }}-${{ matrix.resolution }}
          name: coverage-${{ matrix.python-version }}-${{ matrix.resolution }}
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
          report_type: coverage

      - name: Upload test results
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        if: ${{ !cancelled() }}
        continue-on-error: true
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: junit.xml
          report_type: test_results

      - name: Prune uv cache
        run: uv cache prune --ci

  security:
    name: Security
    needs: [lint]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write # needed for uploading SARIF results to the Security tab
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.14"
          python-version: "3.13"
          enable-cache: true
          cache-suffix: security-3.13-${{ hashFiles('uv.lock') }}

      - name: Sync security dependencies
        run: uv sync --group=security --frozen

      - name: Run pip-audit
        id: pip_audit
        continue-on-error: true
        run: make pip-audit

      - name: Run Bandit
        id: bandit
        continue-on-error: true
        run: make bandit

      - name: Upload Bandit SARIF
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4.35.5
        if: always()
        continue-on-error: true
        with:
          sarif_file: bandit.sarif
          category: bandit

      - name: Run Trivy
        id: trivy
        continue-on-error: true
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          version: v0.70.0
          scan-type: fs
          skip-dirs: .git,.github,.venv,docs/_build
          format: sarif
          output: trivy.sarif
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4.35.5
        if: always()
        continue-on-error: true
        with:
          sarif_file: trivy.sarif
          category: trivy

      - name: Run Zizmor
        id: zizmor
        if: always()
        continue-on-error: true
        run: make zizmor

      - name: Upload Zizmor SARIF
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4.35.5
        if: always()
        continue-on-error: true
        with:
          sarif_file: zizmor.sarif
          category: zizmor

      - name: Prune uv cache
        if: always()
        run: uv cache prune --ci

      - name: Security gate
        if: >-
          ${{
            always() && (
              steps.pip_audit.outcome != 'success' ||
              steps.bandit.outcome != 'success' ||
              steps.trivy.outcome != 'success' ||
              steps.zizmor.outcome != 'success'
            )
          }}
        run: |
          echo "::error::One or more security scanners failed (pip-audit, Bandit, Trivy, or Zizmor)."
          exit 1

  codeql:
    name: CodeQL (${{ matrix.language }})
    needs: [lint]
    runs-on: ubuntu-24.04
    permissions:
      security-events: write # needed for uploading SARIF results to the Security tab
      actions: read # needed for CodeQL Action
      contents: read # needed for CodeQL Action
    env:
      CODEQL_ACTION_FILE_COVERAGE_ON_PRS: "true"
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: python
            build-mode: none
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4.35.5
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4.35.5
        with:
          category: "/language:${{ matrix.language }}"

  build:
    name: Build
    needs: [test, security, codeql]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      released: ${{ steps.version.outputs.released }}
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Checkout accurate branch
        env:
          REF_NAME: ${{ github.ref_name }}
        run: git checkout -B "$REF_NAME"

      - name: Setup uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.14"
          python-version: "3.13"
          enable-cache: true
          cache-suffix: build-3.13-${{ hashFiles('uv.lock') }}

      - name: Sync build dependencies
        run: uv sync --group build --no-default-groups --frozen

      - name: Determine version
        id: version
        run: uv run semantic-release -v version --no-commit --no-tag

      - name: Upload dist
        if: steps.version.outputs.released == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/**
          if-no-files-found: error
          retention-days: 2

      - name: Prune uv cache
        run: uv cache prune --ci

  e2e:
    name: Live E2E Tests
    needs: build
    if: needs.build.outputs.released == 'true'
    runs-on: ubuntu-24.04
    environment: e2e
    env:
      CB_RUN_LIVE_TESTS: "1"
      CB_EVENTS_URL: ${{ secrets.CB_EVENTS_URL }}
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Download dist artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist

      - name: Setup uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.14"
          python-version: "3.13"
          enable-cache: true
          cache-suffix: e2e-3.13-${{ hashFiles('uv.lock') }}

      - name: Sync test dependencies
        run: uv sync --group=test --no-install-project --frozen

      - name: Install built wheel
        run: uv pip install dist/cb_events-*.whl

      - name: Run live E2E tests
        run: make test-live

      - name: Prune uv cache
        run: uv cache prune --ci

  release:
    name: Release
    needs: [build, e2e]
    if: github.ref == 'refs/heads/main' && needs.build.outputs.released == 'true'
    runs-on: ubuntu-24.04
    environment: release
    concurrency:
      group: ${{ github.workflow }}-release-${{ github.ref_name }}
      cancel-in-progress: false
    permissions:
      contents: read
    steps:
      - name: Generate release token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          permission-contents: write

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: true

      - name: Reset to accurate SHA
        env:
          GIT_SHA: ${{ github.sha }}
        run: git reset --hard "$GIT_SHA"

      - name: Setup uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.14"
          python-version: "3.13"
          enable-cache: true
          cache-suffix: release-3.13-${{ hashFiles('uv.lock') }}

      - name: Sync build dependencies
        run: uv sync --group build --no-default-groups --frozen

      - name: Verify upstream is unchanged
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: bash .github/workflows/verify_upstream.sh

      - name: Create release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: uv run semantic-release -v --strict version

      - name: Prune uv cache
        run: uv cache prune --ci

  deploy:
    name: Deploy to PyPI
    needs: [build, release]
    if: >-
      github.ref == 'refs/heads/main' &&
      needs.build.outputs.released == 'true' &&
      github.repository == 'MountainGod2/cb-events'
    runs-on: ubuntu-24.04
    environment:
      name: pypi
      url: https://pypi.org/project/cb-events/
    permissions:
      attestations: write # needed for generating build provenance
      contents: read
      id-token: write # needed for generating build provenance
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: dist
          print-hash: true
          verbose: true
          attestations: true

      - name: Generate build provenance
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: dist/*
