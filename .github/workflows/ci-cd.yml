name: CI/CD

on:
  push:
    branches: [main, "renovate/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions: {}

jobs:
  warm-cache:
    name: Warm Cache
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.13"
          enable-cache: true
          cache-suffix: ${{ hashFiles('uv.lock') }}

      - name: Sync dependencies
        run: uv sync --all-groups --frozen

      - name: Prune uv cache
        run: uv cache prune --ci

  lint:
    name: Lint
    needs: warm-cache
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.13"
          enable-cache: true
          cache-suffix: ${{ hashFiles('uv.lock') }}

      - name: Sync lint dependencies
        run: uv sync --group=lint --frozen

      - name: Run ruff & make lint
        run: |
          uv run ruff format --check
          make lint

      - name: Prune uv cache
        run: uv cache prune --ci

  test:
    name: Test
    needs: [warm-cache, lint]
    runs-on: ubuntu-24.04
    environment: testing
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-suffix: ${{ hashFiles('uv.lock') }}

      - name: Sync test dependencies
        run: uv sync --group=test --frozen

      - name: Run pytest
        run: make test-cov

      - name: Upload coverage metrics
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: coverage.xml
          flags: ${{ matrix.python-version }}
          name: coverage-${{ matrix.python-version }}
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
          report_type: coverage

      - name: Upload test results
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        if: ${{ !cancelled() }}
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: junit.xml
          report_type: test_results

      - name: Prune uv cache
        run: uv cache prune --ci

  security:
    name: Security
    needs: warm-cache
    runs-on: ubuntu-24.04
    permissions:
      security-events: write # Required to upload SARIF results to GitHub Security tab
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.13"
          enable-cache: true
          cache-suffix: ${{ hashFiles('uv.lock') }}

      - name: Sync security dependencies
        run: uv sync --group=security --frozen

      - name: Run pip-audit
        run: make pip-audit

      - name: Run Bandit
        run: make bandit

      - name: Upload Bandit SARIF
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        continue-on-error: true
        with:
          sarif_file: bandit.sarif
          category: bandit

      - name: Run Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          skip-dirs: .git,.github,.venv,docs/_build
          format: sarif
          output: trivy.sarif
          severity: CRITICAL,HIGH
          exit-code: 0

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        continue-on-error: true
        with:
          sarif_file: trivy.sarif
          category: trivy

      - name: Run Zizmor
        run: uv run zizmor --format=sarif . > zizmor.sarif

      - name: Upload Zizmor SARIF
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        continue-on-error: true
        with:
          sarif_file: zizmor.sarif
          category: zizmor

      - name: Prune uv cache
        run: uv cache prune --ci

  codeql:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-24.04
    permissions:
      security-events: write
      actions: read
      contents: read
    env:
      CODEQL_ACTION_FILE_COVERAGE_ON_PRS: "true" # Enable file coverage reporting on PRs
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: python
            build-mode: none
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          category: "/language:${{ matrix.language }}"

  build:
    name: Build
    needs: [test, security]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      released: ${{ steps.version.outputs.released }}
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Checkout accurate branch
        env:
          REF_NAME: ${{ github.ref_name }}
        run: git checkout -B "$REF_NAME"

      - name: Setup uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.13"
          enable-cache: true
          cache-suffix: ${{ hashFiles('uv.lock') }}

      - name: Sync build dependencies
        run: uv sync --group build --no-default-groups --frozen

      - name: Determine version
        id: version
        env:
          GH_TOKEN: none
        run: uv run semantic-release -v version --no-commit --no-tag

      - name: Upload dist
        if: steps.version.outputs.released == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/**
          if-no-files-found: error
          retention-days: 2

      - name: Upload uv.lock
        if: steps.version.outputs.released == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: uv.lock
          path: uv.lock
          if-no-files-found: error
          retention-days: 2

      - name: Prune uv cache
        run: uv cache prune --ci

  e2e:
    name: E2E Tests
    needs: build
    if: needs.build.outputs.released == 'true'
    runs-on: ubuntu-24.04
    environment: e2e
    env:
      CB_USERNAME: ${{ secrets.CB_USERNAME }}
      CB_TOKEN: ${{ secrets.CB_TOKEN }}
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Download dist artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        id: download
        with:
          name: dist
          path: dist

      - name: Setup uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.13"
          enable-cache: true
          cache-suffix: ${{ hashFiles('uv.lock') }}

      - name: Sync test dependencies
        run: uv sync --group=test --frozen

      - name: Install built package
        run: |
          uv pip uninstall cb-events
          uv pip install dist/cb_events-*.whl

      - name: Run E2E tests
        run: make test-e2e

      - name: Prune uv cache
        run: uv cache prune --ci

  release:
    name: Release
    needs: [build, e2e]
    if: github.ref == 'refs/heads/main' && needs.build.outputs.released == 'true'
    runs-on: ubuntu-24.04
    environment: release
    concurrency:
      group: ${{ github.workflow }}-release-${{ github.ref_name }}
      cancel-in-progress: false
    permissions:
      contents: write # Required to create releases, tags, and push commits
    outputs:
      released: ${{ steps.publish.outputs.released }}
      version: ${{ steps.publish.outputs.version }}
      tag: ${{ steps.publish.outputs.tag }}
    steps:
      # semantic-release uses GH_TOKEN for git push auth instead of stored git credentials
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}
          persist-credentials: false

      - name: Reset to accurate SHA
        env:
          GIT_SHA: ${{ github.sha }}
        run: git reset --hard "$GIT_SHA"

      - name: Setup uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.13"
          enable-cache: true
          cache-suffix: ${{ hashFiles('uv.lock') }}

      - name: Sync build dependencies
        run: uv sync --group build --no-default-groups --frozen

      - name: Download dist artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist

      - name: Download uv.lock artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: uv.lock

      - name: Stage uv.lock
        run: git add uv.lock # Needed because --skip-build won't regenerate the lock file

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7.0.0
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          git_user_signingkey: true
          git_commit_gpgsign: true
          git_tag_gpgsign: true

      - name: Publish release
        id: publish
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          bash .github/workflows/verify_upstream.sh
          uv run semantic-release --strict version --skip-build
          uv run semantic-release --strict publish

      - name: Prune uv cache
        run: uv cache prune --ci

  deploy:
    name: Deploy to PyPI
    needs: [build, release]
    if: github.ref == 'refs/heads/main' && needs.release.outputs.released == 'true' && github.repository == 'MountainGod2/cb-events'
    runs-on: ubuntu-24.04
    environment:
      name: pypi
      url: https://pypi.org/project/cb-events/
    permissions:
      attestations: write # Required to create build provenance attestations
      contents: read
      id-token: write # Required for OIDC authentication with PyPI
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: dist
          print-hash: true
          verbose: true
          attestations: true

      - name: Generate build provenance
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: dist/*
