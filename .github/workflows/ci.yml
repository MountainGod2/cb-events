name: CI

on:
  push:
    branches: [main, "renovate/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' && github.ref != 'refs/heads/main' }}

permissions: {}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.16"
          python-version: "3.13"
          enable-cache: true
          cache-suffix: lint-3.13-${{ hashFiles('uv.lock') }}

      - name: Sync lint and docs dependencies
        run: uv sync --group=lint --group=docs --frozen

      - name: Verify requirements.txt is up to date
        run: make requirements-check

      - name: Run lint checks
        run: make lint

      - name: Prune uv cache
        if: always()
        run: uv cache prune --ci

  test:
    name: Test (Python ${{ matrix.python-version }})
    needs: lint
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    environment: testing
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.16"
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-suffix: test-${{ matrix.python-version }}-highest-${{ hashFiles('pyproject.toml', 'uv.lock') }}

      - name: Sync test dependencies
        run: uv sync --group=test --frozen

      - name: Run tests with coverage
        env:
          COVERAGE_FILE: .coverage.${{ matrix.python-version }}
        run: make test-cov

      - name: Upload coverage data artifact
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-data-py${{ matrix.python-version }}
          path: .coverage.${{ matrix.python-version }}
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 2

      - name: Prune uv cache
        if: always()
        run: uv cache prune --ci

  test-lowest-direct:
    name: Test (Python 3.10, lowest-direct)
    needs: lint
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    environment: testing
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.16"
          python-version: "3.10"
          enable-cache: true
          cache-suffix: test-3.10-lowest-direct-${{ hashFiles('pyproject.toml', 'uv.lock') }}

      - name: Run tests with lowest direct dependency bounds
        run: make test-cov-lowest-direct

      - name: Prune uv cache
        if: always()
        run: uv cache prune --ci

  coverage-summary:
    name: Coverage Summary
    needs: test
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.16"
          python-version: "3.14"
          enable-cache: true
          cache-suffix: coverage-summary-3.14-${{ hashFiles('pyproject.toml', 'uv.lock') }}

      - name: Sync test dependencies
        run: uv sync --group=test --frozen

      - name: Download coverage data artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: coverage-data-py*
          merge-multiple: true
          path: coverage-artifacts

      - name: Combine and report coverage
        run: |
          uv run coverage combine --keep coverage-artifacts
          uv run coverage report --show-missing --skip-covered | tee coverage-report.txt
          uv run coverage xml -o coverage.xml

      - name: Publish coverage summary
        run: |
          {
            echo "## Coverage Summary"
            echo
            echo "Combined branch coverage for supported Python versions."
            echo
            echo '```text'
            cat coverage-report.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload combined coverage artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-combined
          path: |
            coverage.xml
            coverage-report.txt
          if-no-files-found: error
          retention-days: 2

      - name: Prune uv cache
        if: always()
        run: uv cache prune --ci

  security:
    name: Security
    needs: [lint]
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.16"
          python-version: "3.13"
          enable-cache: true
          cache-suffix: security-3.13-${{ hashFiles('uv.lock') }}

      - name: Sync security dependencies
        run: uv sync --group=security --frozen

      - name: Run pip-audit
        id: pip_audit
        continue-on-error: true
        run: make pip-audit

      - name: Run Bandit
        id: bandit
        continue-on-error: true
        run: make bandit

      - name: Upload Bandit SARIF
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        if: always()
        continue-on-error: true
        with:
          sarif_file: bandit.sarif
          category: bandit

      - name: Run Trivy
        id: trivy
        continue-on-error: true
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          version: v0.70.0
          scan-type: fs
          skip-dirs: .git,.github,.venv,docs/_build
          format: sarif
          output: trivy.sarif
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        if: always()
        continue-on-error: true
        with:
          sarif_file: trivy.sarif
          category: trivy

      - name: Run Zizmor
        id: zizmor
        if: always()
        continue-on-error: true
        run: make zizmor

      - name: Upload Zizmor SARIF
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        if: always()
        continue-on-error: true
        with:
          sarif_file: zizmor.sarif
          category: zizmor

      - name: Prune uv cache
        if: always()
        run: uv cache prune --ci

      - name: Security gate
        if: >-
          ${{
            always() && (
              steps.pip_audit.outcome != 'success' ||
              steps.bandit.outcome != 'success' ||
              steps.trivy.outcome != 'success' ||
              steps.zizmor.outcome != 'success'
            )
          }}
        run: |
          echo "::error::One or more security scanners failed (pip-audit, Bandit, Trivy, or Zizmor)."
          exit 1

  codeql:
    name: CodeQL (${{ matrix.language }})
    needs: [lint]
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      security-events: write
      actions: read
      contents: read
    env:
      CODEQL_ACTION_FILE_COVERAGE_ON_PRS: "true"
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: python
            build-mode: none
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          category: "/language:${{ matrix.language }}"
