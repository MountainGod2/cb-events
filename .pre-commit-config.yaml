repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
        name: gitleaks secret scan
        args: [--redact]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: check-case-conflict
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: https://github.com/adhtruong/mirrors-typos
    rev: v1.47.2
    hooks:
      - id: typos
        name: typos spell check
        args: [--format=brief]
        exclude: ^(uv\.lock|\.git/|CHANGELOG\.md)
        types_or: [text]

  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.37.3
    hooks:
      - id: check-github-workflows
        name: check github workflows

  - repo: https://github.com/renovatebot/pre-commit-hooks
    rev: 43.235.1
    hooks:
      - id: renovate-config-validator
        args: [--strict]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.18
    hooks:
      - id: ruff-check
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        name: bandit security check
        args: [-c, pyproject.toml]
        additional_dependencies: ["bandit[toml]"]
        exclude: ^tests/

  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: v1.26.1
    hooks:
      - id: zizmor
        name: zizmor security check

  - repo: local
    hooks:
      - id: format-docs-markdown
        name: format docs markdown files
        entry: uv run --group=docs mdformat
        language: system
        files: ^(docs/.*\.md|README\.md)$

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.23
    hooks:
      - id: uv-lock
        name: uv lockfile update
      - id: uv-audit
        name: uv dependency audit
        args: ["--preview-features=audit-command"]

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        name: conventional commit check
        stages: [commit-msg]
        args: [--strict, --force-scope]
